name: Bump flake.lock

# Requires the Actions secret PAT_TOKEN with the same value as gitea-pat-token in SOPS.

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: native

    env:
      GIT_TERMINAL_PROMPT: "0"

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Configure Git auth for private Gitea repos
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PAT_TOKEN:-}" ]; then
            echo "Missing Actions secret PAT_TOKEN"
            exit 1
          fi

          git config --global \
            http."https://gitea.znaniye.xyz/".extraHeader \
            "Authorization: token $PAT_TOKEN"

          git ls-remote "https://gitea.znaniye.xyz/znaniye/emit.git" >/dev/null

      - name: Update flake.lock
        run: |
          set -euo pipefail

          git config user.name "${{ gitea.actor }}"
          git config user.email "${{ gitea.actor }}@users.noreply.local"
          nix --accept-flake-config flake update --commit-lock-file

      - name: Build golf
        run: |
          nix --accept-flake-config build -L .#nixosConfigurations.golf.config.system.build.toplevel

      - name: Push branch
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PAT_TOKEN:-}" ]; then
            echo "Missing Actions secret PAT_TOKEN"
            exit 1
          fi

          git fetch origin master

          if [ -z "$(git rev-list --max-count=1 origin/master..HEAD)" ]; then
            echo "No flake.lock changes to push"
            exit 0
          fi

          git -c "http.extraHeader=Authorization: token $PAT_TOKEN" \
            push --force-with-lease origin HEAD:flake-updates

      - name: Create pull request
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PAT_TOKEN:-}" ]; then
            echo "Missing Actions secret PAT_TOKEN"
            exit 1
          fi

          if [ -z "$(git rev-list --max-count=1 origin/master..HEAD)" ]; then
            echo "No flake.lock changes, skipping PR creation"
            exit 0
          fi

          run_url="https://gitea.znaniye.xyz/${{ gitea.repository }}/actions/runs/${{ gitea.run_id }}"
          payload="{\"title\":\"Update flake.lock\",\"head\":\"flake-updates\",\"base\":\"master\",\"body\":\"Run report: $run_url\"}"

          curl --silent --show-error --fail \
            -X POST \
            -H "Authorization: token $PAT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://gitea.znaniye.xyz/api/v1/repos/${{ gitea.repository }}/pulls" \
            || echo "Pull request already exists"
