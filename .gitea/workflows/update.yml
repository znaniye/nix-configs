name: Bump flake.lock

# Requires the Actions secret PAT_TOKEN with the same value as gitea-pat-token in SOPS.

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: native

    env:
      GIT_TERMINAL_PROMPT: "0"

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Configure Git auth for private Gitea repos
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PAT_TOKEN:-}" ]; then
            echo "Missing Actions secret PAT_TOKEN"
            exit 1
          fi

          git config --global \
            http."https://gitea.znaniye.xyz/".extraHeader \
            "Authorization: token $PAT_TOKEN"

          git ls-remote "https://gitea.znaniye.xyz/znaniye/emit.git" >/dev/null

      - name: Update flake.lock
        run: |
          set -euo pipefail

          git config user.name "${{ gitea.actor }}"
          git config user.email "${{ gitea.actor }}@users.noreply.local"
          nix --accept-flake-config flake update --commit-lock-file

      - name: Build golf
        run: |
          current_system="$(nix eval --impure --raw --expr builtins.currentSystem)"

          if [ "$current_system" = "x86_64-linux" ]; then
            nix --accept-flake-config --option builders '' build -L .#nixosConfigurations.golf.config.system.build.toplevel
          else
            nix --accept-flake-config eval --raw .#nixosConfigurations.golf.config.system.build.toplevel.drvPath >/dev/null
          fi

      - name: Build tortinha
        run: |
          current_system="$(nix eval --impure --raw --expr builtins.currentSystem)"

          if [ "$current_system" = "aarch64-linux" ]; then
            nix --accept-flake-config --option builders '' build -L .#nixosConfigurations.tortinha.config.system.build.toplevel
          else
            nix --accept-flake-config eval --raw .#nixosConfigurations.tortinha.config.system.build.toplevel.drvPath >/dev/null
          fi

      - name: Push branch
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PAT_TOKEN:-}" ]; then
            echo "Missing Actions secret PAT_TOKEN"
            exit 1
          fi

          git fetch origin master
          git fetch origin flake-updates || true

          if [ -z "$(git rev-list --max-count=1 origin/master..HEAD)" ]; then
            echo "No flake.lock changes to push"
            exit 0
          fi

          if git rev-parse --verify --quiet origin/flake-updates >/dev/null; then
            lease="--force-with-lease=flake-updates:$(git rev-parse origin/flake-updates)"
          else
            lease="--force"
          fi

          git -c "http.extraHeader=Authorization: token $PAT_TOKEN" \
            push $lease origin HEAD:flake-updates

      - name: Create or update pull request
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PAT_TOKEN:-}" ]; then
            echo "Missing Actions secret PAT_TOKEN"
            exit 1
          fi

          if [ -z "$(git rev-list --max-count=1 origin/master..HEAD)" ]; then
            echo "No flake.lock changes, skipping PR"
            exit 0
          fi

          repo="${{ gitea.repository }}"
          owner="${repo%%/*}"
          api="https://gitea.znaniye.xyz/api/v1/repos/$repo"
          run_url="https://gitea.znaniye.xyz/$repo/actions/runs/${{ gitea.run_id }}"
          # body is a fixed, URL-only string — safe to embed in JSON without escaping.
          body="Run report: $run_url"

          existing=$(curl -sS -H "Authorization: token $PAT_TOKEN" \
            "$api/pulls?state=open&head=${owner}:flake-updates" \
            | grep -o '"number":[[:space:]]*[0-9]*' \
            | head -n1 \
            | grep -o '[0-9]*$' || true)

          if [ -n "$existing" ]; then
            echo "Updating PR #$existing body"
            curl -sS --fail -X PATCH \
              -H "Authorization: token $PAT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"body\":\"$body\"}" \
              "$api/issues/$existing" >/dev/null
          else
            echo "Creating PR"
            curl -sS --fail -X POST \
              -H "Authorization: token $PAT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"Update flake.lock\",\"head\":\"flake-updates\",\"base\":\"master\",\"body\":\"$body\"}" \
              "$api/pulls" >/dev/null
          fi
